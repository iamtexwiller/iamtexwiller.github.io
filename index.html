<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Tex Willer: Profile Card</title>
  <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel='stylesheet' href='https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css'>
  <link rel="stylesheet" href="./style.css">

</head>

<body>
  <aside class="profile-card">
    <header>
      <!-- here’s the avatar -->
      <a>
        <img src="profile.jpeg" class="hoverZoomLink">
      </a>

      <!-- the username -->
      <h1>
        Tex Willer
      </h1>

      <!-- and role or location -->
      <h2>
        Application Support Engineer L2 | Hybrid Cloud & On-Prem
      </h2>

    </header>

    <!-- bit of a bio; who are you? -->
    <div class="profile-bio">

      <p>
        Automatizo hoje pra não sofrer amanhã (ou sofrer menos).
      </p>

    </div>

    <!-- some social links to show off -->
    <ul class="profile-social-links">
      <li>
        <a target="_blank" href="https://www.linkedin.com/in/eutexwiller/">
          <i class="fa fa-linkedin"></i>
        </a>
      </li>
      <li>
        <a target="_blank" href="https://www.credly.com/users/texwiller/badges#credly">
          <i class="fa-solid fa-award"></i>
        </a>
      </li>
      <li>
        <a target="_blank" href="https://github.com/iamtexwiller">
          <i class="fa fa-github"></i>
        </a>
      </li>
      <li>
        <a target="_blank" href="https://www.instagram.com/tex.willer">

          <i class="fa fa-instagram"></i>
        </a>
      </li>
    </ul>
  </aside>

</body>

</html>
